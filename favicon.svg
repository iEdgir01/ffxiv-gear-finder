<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="FFXIV Gear Finder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background coin -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="29" fill="none" stroke="url(#rim)" stroke-width="2.5"/>

  <!-- Simple "finder" glyph: crosshair + blade -->
  <g fill="none" stroke="#e5e7eb" stroke-linecap="round" stroke-linejoin="round">
    <!-- crosshair -->
    <circle cx="26" cy="30" r="10" stroke-width="2.5" opacity="0.9"/>
    <path d="M26 16v4M26 40v4M12 30h4M36 30h4" stroke-width="2.5" opacity="0.9"/>
    <!-- blade -->
    <path d="M38 18l8 8-14 14-10 2 2-10 14-14z" stroke-width="2.5"/>
    <path d="M40 20l6 6" stroke-width="2.5" opacity="0.9"/>
  </g>
</svg>

