<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFXIV Gear Finder</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>FFXIV Gear Finder</h1>
        <p class="tagline">Find your best craftable gear</p>
      </div>

      <section class="sidebar-section" id="import-section">
        <h2 class="section-label">Import Character</h2>
        <input type="text" id="char-name" placeholder="Character name">
        <select id="char-datacenter" class="combat-select" style="margin-bottom:6px" aria-label="Data centre">
          <option value="">Any data centre</option>
          <option>Aether</option>
          <option>Crystal</option>
          <option>Dynamis</option>
          <option>Primal</option>
          <option>Chaos</option>
          <option>Light</option>
          <option>Elemental</option>
          <option>Gaia</option>
          <option>Mana</option>
          <option>Meteor</option>
          <option>Materia</option>
        </select>
        <select id="char-server" class="combat-select" style="margin-bottom:6px" hidden aria-label="Server">
          <option value="">Any server</option>
        </select>
        <button class="btn-primary" id="btn-search-char" type="button">Search</button>
        <div id="char-results"></div>
        <div id="import-status" class="status-msg" hidden></div>
        <div id="char-info" class="char-info" hidden></div>
      </section>

      <section class="sidebar-section" id="job-group-section">
        <h2 class="section-label">Job Group</h2>
        <div class="pill-group" id="group-pills">
          <button class="pill active" data-group="doh">DoH</button>
          <button class="pill" data-group="dol">DoL</button>
          <button class="pill" data-group="dow">DoW</button>
          <button class="pill" data-group="dom">DoM</button>
        </div>
        <div id="job-select-wrap" hidden>
          <select id="job-select" class="combat-select"></select>
        </div>
        <div id="level-display" class="level-display"></div>
      </section>

      <section class="sidebar-section" id="stat-section">
        <h2 class="section-label">Gear Stat</h2>
        <div class="pill-group" id="stat-pills"></div>
      </section>

      <section class="sidebar-section" id="gear-type-section">
        <h2 class="section-label">Gear Type</h2>
        <div class="pill-group" id="gear-type-pills"></div>
      </section>
    </aside>

    <main id="results-panel">
      <div class="main-tabs" role="tablist">
        <button class="main-tab active" role="tab" data-panel="finder" aria-selected="true">Gear Finder</button>
        <button class="main-tab" role="tab" data-panel="upgrade" aria-selected="false">Upgrades</button>
      </div>
      <div id="finder-panel">
        <div class="finder-toolbar">
          <div id="results-header" class="results-header"></div>
          <button id="btn-open-lists" class="btn-secondary btn-sm">Lists</button>
        </div>
        <div id="results-grid" class="results-grid"></div>
      </div>
      <div id="upgrade-panel" hidden>
        <div id="upgrade-content"></div>
      </div>
    </main>
    <div id="list-panel" class="list-panel" hidden>
      <div class="list-panel-header">
        <h2>My Lists</h2>
        <button id="btn-close-lists" class="btn-icon" aria-label="Close lists">&#x2715;</button>
      </div>
      <div id="list-panel-body"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
